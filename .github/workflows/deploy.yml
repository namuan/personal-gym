name: Deploy to GitHub Pages

# Builds the production bundle and publishes dist/ to GitHub Pages.
# Triggered on pushes to main, and manually from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required so actions/deploy-pages can publish to the Pages environment.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't run a stale deploy while a previous one is still in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Vite's `base` is read from vite.config.js. Override it here if
        # the repo ever moves off the project-site path.
        run: npm run build

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
